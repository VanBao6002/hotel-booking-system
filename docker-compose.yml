version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: hotel_db
    restart: always
    environment:
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel_pass
      POSTGRES_DB: hotel_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: hotel_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: hotel_backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data: