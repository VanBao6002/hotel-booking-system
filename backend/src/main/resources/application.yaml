spring:
  application:
    name: hotel-booking

  datasource:
    url: jdbc:mysql://mysql:3306/hotel_booking?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: hotel_user
    password: hotel_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    com.hotel.booking: DEBUG
    org.springframework.security: DEBUG